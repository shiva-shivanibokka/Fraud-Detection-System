name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      # Public HF Hub model repo — pulled so tests run against real artifacts
      # (mirrors the Render build). No token needed for a public repo.
      HF_REPO_ID: shiva-1993/fraud-detection-model
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Pull model artifacts from HF Hub
        run: python -m src.download_models

      - name: Run tests
        run: pytest
