<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraud Detection Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #F4F6FB;
        --primary: #4F46E5;
        --sky: #0EA5E9;
        --pink: #EC4899;
        --border: #E7EAF3;
        --ink: #161B2E;
      }

      html { scroll-behavior: smooth; }

      body {
        position: relative;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Soft light wash — subtle colored blobs for depth, not a dark aurora. */
      body::before {
        content: "";
        position: fixed;
        inset: -10%;
        z-index: 0;
        background:
          radial-gradient(34% 34% at 12% 6%, rgba(79, 70, 229, 0.10), transparent 70%),
          radial-gradient(30% 30% at 92% 4%, rgba(14, 165, 233, 0.10), transparent 70%),
          radial-gradient(36% 36% at 88% 96%, rgba(236, 72, 153, 0.07), transparent 70%);
        pointer-events: none;
      }
      #root { position: relative; z-index: 1; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes rowIn {
        from { opacity: 0; transform: translateX(-10px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes pulseRed {
        0%, 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.40); }
        50%      { box-shadow: 0 0 26px 3px rgba(244, 63, 94, 0.40); }
      }
      @keyframes signalPing {
        0%   { transform: scale(1); opacity: 0.9; }
        70%  { transform: scale(2.6); opacity: 0; }
        100% { transform: scale(2.6); opacity: 0; }
      }

      .fade-up { animation: fadeUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) both; }
      .row-in  { animation: rowIn 0.32s ease both; }
      .pulse-red { animation: pulseRed 1.6s ease-in-out infinite; }

      /* White surface with soft depth — the professional card. */
      .glass {
        background: #FFFFFF;
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 10px 34px -14px rgba(38, 50, 90, 0.22);
      }

      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
      .grid-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .grid-rings { display: grid; grid-template-columns: minmax(300px, 380px) 1fr; gap: 20px; }
      @media (max-width: 880px) { .grid-2 { grid-template-columns: 1fr; } }
      @media (max-width: 820px) { .grid-rings { grid-template-columns: 1fr; } }
      @media (max-width: 580px) { .grid-fields { grid-template-columns: 1fr; } }

      input, select, textarea, button { font-family: inherit; }
      input::placeholder, textarea::placeholder { color: #A2AAB9; }
      select option { background: #FFFFFF; color: var(--ink); }

      :focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 2px;
        border-radius: 8px;
      }

      input[type=range] { accent-color: var(--primary); }
      input[type=datetime-local], input[type=time] { color-scheme: light; }

      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: #CDD4E4;
        border-radius: 10px;
        border: 2px solid var(--bg);
      }
      ::-webkit-scrollbar-thumb:hover { background: #B6BFD4; }

      @media (prefers-reduced-motion: reduce) {
        body::before { animation: none; }
        .fade-up, .row-in, .pulse-red { animation: none !important; }
        html { scroll-behavior: auto; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
