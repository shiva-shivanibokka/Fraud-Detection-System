<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraud Detection Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --ink: #150A30;
        --iris: #7C5CFF;
        --cyan: #22D3EE;
        --magenta: #FF4D8D;
      }

      html { scroll-behavior: smooth; }

      body {
        position: relative;
        min-height: 100vh;
        background: var(--ink);
        color: #F3EEFF;
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Ambient aurora — slow-drifting saturated blobs behind everything. */
      body::before {
        content: "";
        position: fixed;
        inset: -20%;
        z-index: 0;
        background:
          radial-gradient(38% 38% at 18% 14%, rgba(124, 92, 255, 0.40), transparent 70%),
          radial-gradient(34% 34% at 84% 12%, rgba(34, 211, 238, 0.30), transparent 70%),
          radial-gradient(42% 42% at 78% 88%, rgba(255, 77, 141, 0.28), transparent 70%),
          radial-gradient(40% 40% at 12% 86%, rgba(124, 92, 255, 0.22), transparent 70%);
        filter: blur(20px);
        animation: drift 26s ease-in-out infinite alternate;
        pointer-events: none;
      }
      #root { position: relative; z-index: 1; }

      @keyframes drift {
        0%   { transform: translate3d(0, 0, 0) scale(1); }
        50%  { transform: translate3d(2.5%, -2%, 0) scale(1.08); }
        100% { transform: translate3d(-2%, 2.5%, 0) scale(1.04); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes rowIn {
        from { opacity: 0; transform: translateX(-10px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes pulseRed {
        0%, 100% { box-shadow: 0 0 0 0 rgba(255, 61, 110, 0.55); }
        50%      { box-shadow: 0 0 28px 4px rgba(255, 61, 110, 0.55); }
      }
      @keyframes signalPing {
        0%   { transform: scale(1); opacity: 1; }
        70%  { transform: scale(2.6); opacity: 0; }
        100% { transform: scale(2.6); opacity: 0; }
      }

      .fade-up { animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }
      .row-in  { animation: rowIn 0.35s ease both; }
      .pulse-red { animation: pulseRed 1.6s ease-in-out infinite; }

      .glass {
        background: linear-gradient(160deg, rgba(46, 26, 102, 0.62), rgba(28, 16, 66, 0.62));
        border: 1px solid rgba(150, 120, 255, 0.22);
        border-radius: 18px;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 18px 50px -24px rgba(124, 92, 255, 0.45);
      }

      /* Responsive grids (inline styles can't do media queries). */
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      .grid-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      @media (max-width: 860px) { .grid-2 { grid-template-columns: 1fr; } }
      @media (max-width: 560px) { .grid-fields { grid-template-columns: 1fr; } }

      input, select, textarea, button { font-family: inherit; }
      input::placeholder, textarea::placeholder { color: #6f63a6; }
      select option { background: #1B0E3E; color: #F3EEFF; }

      :focus-visible {
        outline: 2px solid var(--cyan);
        outline-offset: 2px;
        border-radius: 6px;
      }

      input[type=range] { accent-color: var(--iris); }
      input[type=datetime-local], input[type=time] { color-scheme: dark; }

      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(var(--iris), var(--cyan));
        border-radius: 8px;
      }

      @media (prefers-reduced-motion: reduce) {
        body::before { animation: none; }
        .fade-up, .row-in, .pulse-red { animation: none !important; }
        html { scroll-behavior: auto; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
