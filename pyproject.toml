[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.pytest.ini_options]
# Put the repo root on sys.path so tests can `import src...`
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"
